<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Karhu Väistelee</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a0f00;
  color: #ffe8c0;
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

/* ── SCREENS ── */
#screenStart, #screenEnd {
  position: fixed;
  inset: 0;
  background: rgba(20, 10, 0, 0.97);
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 30px 24px;
}

#screenEnd { display: none; }

.sc-bear { font-size: 5rem; }
.sc-title {
  font-family: 'Fredoka One', cursive;
  font-size: 2.5rem;
  color: #ff9a3c;
  text-align: center;
}
.sc-desc {
  font-size: 0.95rem;
  color: #a07840;
  text-align: center;
  max-width: 300px;
  line-height: 1.6;
}
.sc-final {
  font-family: 'Fredoka One', cursive;
  font-size: 4.5rem;
  color: #ffd93d;
}
.sc-msg { font-size: 1rem; color: #a07840; text-align: center; }

.btn {
  font-family: 'Fredoka One', cursive;
  font-size: 1.2rem;
  padding: 14px 36px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.95); }
.btn-main {
  background: linear-gradient(135deg, #ff9a3c, #ffb347);
  color: #1a0f00;
  box-shadow: 0 5px 20px rgba(255,154,60,0.45);
  margin-top: 8px;
}
.btn-sec {
  background: rgba(255,255,255,0.08);
  color: #ffe8c0;
  border: 2px solid rgba(255,255,255,0.15);
}

#loadStatus {
  font-size: 0.82rem;
  color: #a07840;
  min-height: 1.2em;
}

/* ── GAME UI ── */
#gameUI {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  min-height: 100vh;
}

#hud {
  width: 100%;
  max-width: 600px;
  padding: 8px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(20,10,0,0.9);
  border-bottom: 2px solid rgba(255,154,60,0.25);
}

.hud-group { display: flex; gap: 14px; align-items: center; }
.hud-item { text-align: center; }
.hud-lbl { font-size: 0.58rem; color: #a07840; text-transform: uppercase; letter-spacing: 1px; }
.hud-val { font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: #ffd93d; line-height: 1; }
#livesVal { font-size: 1.1rem; }

#gameMain {
  flex: 1;
  width: 100%;
  max-width: 600px;
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#gameCanvas {
  width: 100%;
  border-radius: 14px;
  border: 3px solid rgba(255,154,60,0.3);
  display: block;
}

.bottom-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 8px;
}

.left-info { display: flex; flex-direction: column; gap: 6px; flex: 1; }

.chips { display: flex; gap: 8px; }
.chip {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 0.78rem;
  color: #a07840;
  transition: all 0.1s;
}
.chip.active {
  background: rgba(255,154,60,0.2);
  border-color: #ff9a3c;
  color: #ff9a3c;
}

.status-row { display: flex; align-items: center; gap: 6px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #a07840; flex-shrink: 0; }
.dot.on { background: #6bcb77; box-shadow: 0 0 6px #6bcb77; }
.dot.blink { background: #ffd93d; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.status-txt { font-size: 0.72rem; color: #a07840; }

#camWrap {
  position: relative;
  width: 110px; height: 82px;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid rgba(255,154,60,0.35);
  background: #000;
  flex-shrink: 0;
}
#video {
  width: 100%; height: 100%;
  object-fit: cover;
  -webkit-transform: scaleX(-1);
  transform: scaleX(-1);
  display: block;
}
#poseCanvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  -webkit-transform: scaleX(-1);
  transform: scaleX(-1);
}

/* hit flash */
#hitFlash {
  position: fixed; inset: 0;
  pointer-events: none;
  opacity: 0;
  z-index: 900;
  transition: opacity 0.1s;
}
</style>
</head>
<body>

<!-- HIT FLASH -->
<div id="hitFlash"></div>

<!-- START SCREEN -->
<div id="screenStart">
  <div class="sc-bear">🐻</div>
  <div class="sc-title">Karhu Väistelee!</div>
  <div class="sc-desc">
    <strong style="color:#ff9a3c">Hyppää ylös</strong> väistelläksesi maassa rullavia tynnyreitä.<br>
    <strong style="color:#ffd93d">Mene kyykkyyn</strong> väistelläksesi lentäviä tynnyreitä.<br><br>
    3 elämää. Vauhti kiihtyy!
  </div>
  <div id="loadStatus">⏳ Ladataan...</div>
  <button class="btn btn-main" id="btnStart" onclick="btnStartClicked()">Aloita peli! 🎮</button>
</div>

<!-- END SCREEN -->
<div id="screenEnd">
  <div class="sc-bear">💥</div>
  <div class="sc-title">Peli ohi!</div>
  <div class="sc-final" id="endScore">0</div>
  <div class="sc-msg" id="endMsg">pistettä</div>
  <button class="btn btn-main" onclick="restartGame()">Uudelleen! 🔄</button>
  <button class="btn btn-sec" onclick="goToStart()">Etusivu</button>
</div>

<!-- GAME -->
<div id="gameUI">
  <div id="hud">
    <div class="hud-group">
      <div class="hud-item">
        <div class="hud-lbl">Pisteet</div>
        <div class="hud-val" id="hudScore">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-lbl">Nopeus</div>
        <div class="hud-val" id="hudSpeed">1.0x</div>
      </div>
    </div>
    <div class="hud-item">
      <div class="hud-lbl">Elämät</div>
      <div class="hud-val" id="livesVal">❤️❤️❤️</div>
    </div>
  </div>

  <div id="gameMain">
    <canvas id="gameCanvas"></canvas>
    <div class="bottom-row">
      <div class="left-info">
        <div class="chips">
          <div class="chip" id="chipJump">⬆️ Hyppää</div>
          <div class="chip" id="chipSquat">⬇️ Kyykky</div>
        </div>
        <div class="status-row">
          <div class="dot" id="statusDot"></div>
          <span class="status-txt" id="statusTxt">Odotetaan kameraa...</span>
        </div>
      </div>
      <div id="camWrap">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="poseCanvas"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
// ═══════════════════════════
// CONSTANTS
// ═══════════════════════════
const GW = 480, GH = 270;
const GROUND_Y = GH - 52;
const BEAR_X = 78;
const STAND_H = 48, SQUAT_H = 28, BEAR_W = 40;
const JUMP_VY = -13, GRAVITY = 0.58;
const SCORE_THR = 0.2;
const HOLD_MS = 400;

// ═══════════════════════════
// STATE
// ═══════════════════════════
let gameActive = false;
let score = 0, lives = 3, frameN = 0, speedMult = 1;
let barrels = [], barrelTimer = 0;
let invincible = 0;
let animId = null, idleId = null;

const bear = { y: GROUND_Y, vy: 0, state: 'stand', frame: 0 };

// Pose
let detector = null, tfReady = false;
let poseState = 'stand';
let baseShoulderY = null, calibN = 0;
let holdStart = null;

// ═══════════════════════════
// DOM
// ═══════════════════════════
const gc    = document.getElementById('gameCanvas').getContext('2d');
const pc    = document.getElementById('poseCanvas').getContext('2d');
const video = document.getElementById('video');
const gcanv = document.getElementById('gameCanvas');
gcanv.width = GW; gcanv.height = GH;

// ═══════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════
function showScreen(id) {
  document.getElementById('screenStart').style.display = 'none';
  document.getElementById('screenEnd').style.display   = 'none';
  if (id) document.getElementById(id).style.display = 'flex';
}

// ═══════════════════════════
// BUTTON HANDLER
// ═══════════════════════════
function btnStartClicked() {
  startGame();
}

function restartGame() {
  startGame();
}

function goToStart() {
  gameActive = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  showScreen('screenStart');
  runIdle();
}

// ═══════════════════════════
// START GAME
// ═══════════════════════════
function startGame() {
  // stop idle
  if (idleId) { cancelAnimationFrame(idleId); idleId = null; }
  if (animId)  { cancelAnimationFrame(animId);  animId  = null; }

  // reset state
  score = 0; lives = 3; frameN = 0; speedMult = 1;
  barrels = []; barrelTimer = 0; invincible = 0;
  bear.y = GROUND_Y; bear.vy = 0; bear.state = 'stand'; bear.frame = 0;
  baseShoulderY = null; calibN = 0; holdStart = null;
  poseState = 'stand';

  updateHUD();
  showScreen(null); // hide all screens

  gameActive = true;
  animId = requestAnimationFrame(gameLoop);
}

// ═══════════════════════════
// END GAME
// ═══════════════════════════
function endGame() {
  gameActive = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }

  document.getElementById('endScore').textContent = score;
  document.getElementById('endMsg').textContent =
    score > 120 ? 'pistettä — Karhu-mestari! 🏆' :
    score > 60  ? 'pistettä — Hyvin meni! 👏' : 'pistettä — Harjoittele lisää! 💪';

  showScreen('screenEnd');
}

// ═══════════════════════════
// HUD
// ═══════════════════════════
function updateHUD() {
  document.getElementById('hudScore').textContent  = score;
  document.getElementById('hudSpeed').textContent  = speedMult.toFixed(1) + 'x';
  const h = ['💀','❤️','❤️❤️','❤️❤️❤️'];
  document.getElementById('livesVal').textContent  = h[Math.max(0, Math.min(3, lives))];
}

// ═══════════════════════════
// IDLE ANIMATION
// ═══════════════════════════
function runIdle() {
  if (gameActive) return;
  gc.clearRect(0,0,GW,GH);
  drawBg();
  drawBear(BEAR_X, GROUND_Y, 'stand', Date.now()*0.05);
  idleId = requestAnimationFrame(runIdle);
}

// ═══════════════════════════
// GAME LOOP
// ═══════════════════════════
function gameLoop() {
  if (!gameActive) return;
  frameN++; bear.frame++;

  // ── Apply pose ──
  if (poseState === 'jump' && bear.y >= GROUND_Y - 2 && bear.state !== 'jump') {
    bear.vy = JUMP_VY; bear.state = 'jump';
  } else if (poseState === 'squat' && bear.y >= GROUND_Y - 2) {
    bear.state = 'squat';
  } else if (poseState === 'stand' && bear.y >= GROUND_Y - 2) {
    bear.state = 'stand';
  }

  // ── Physics ──
  if (bear.y < GROUND_Y || bear.vy < 0) {
    bear.vy += GRAVITY;
    bear.y  += bear.vy;
    if (bear.y >= GROUND_Y) {
      bear.y  = GROUND_Y;
      bear.vy = 0;
      bear.state = poseState === 'squat' ? 'squat' : 'stand';
    }
  }

  // ── Speed ramp ──
  speedMult = 1 + Math.floor(frameN / 220) * 0.18;
  const spd = 3.5 * speedMult;

  // ── Barrel spawn ──
  barrelTimer++;
  const interval = Math.max(52, 115 - Math.floor(frameN / 280) * 7);
  if (barrelTimer >= interval) { spawnBarrel(); barrelTimer = 0; }

  // ── Move barrels & check collision ──
  for (let i = barrels.length - 1; i >= 0; i--) {
    const b = barrels[i];
    b.x -= spd;
    if (b.type === 'ground') b.rot += spd * 0.04;

    if (b.x < -60) {
      barrels.splice(i, 1);
      score++;
      updateHUD();
      continue;
    }

    if (invincible <= 0 && collides(b)) {
      barrels.splice(i, 1);
      lives--;
      invincible = 85;
      updateHUD();
      flashHit();
      if (lives <= 0) { endGame(); return; }
    }
  }
  if (invincible > 0) invincible--;

  // ── Score over time ──
  if (frameN % 28 === 0) { score++; updateHUD(); }

  // ── Draw ──
  gc.clearRect(0,0,GW,GH);
  drawBg();
  barrels.forEach(drawBarrel);
  drawBear(BEAR_X, bear.y, bear.state, bear.frame);
  drawSpeedBar();

  animId = requestAnimationFrame(gameLoop);
}

// ═══════════════════════════
// SPAWN BARREL
// ═══════════════════════════
function spawnBarrel() {
  if (Math.random() < 0.55) {
    barrels.push({ x: GW + 40, y: GROUND_Y + 8, type: 'ground', w: 34, h: 34, rot: 0 });
  } else {
    const airY = GROUND_Y - 58 - Math.random() * 14;
    barrels.push({ x: GW + 40, y: airY, type: 'air', w: 30, h: 30, rot: 0 });
  }
}

// ═══════════════════════════
// COLLISION
// ═══════════════════════════
function collides(b) {
  const bh = bear.state === 'squat' ? SQUAT_H : STAND_H;
  const ax = BEAR_X - BEAR_W * 0.38, ay = bear.y - bh;
  const aw = BEAR_W * 0.76, ah = bh * 0.82;
  const bx = b.x - b.w * 0.4, by2 = b.y - b.h * 0.4;
  const bw = b.w * 0.8, bh2 = b.h * 0.8;
  return ax < bx+bw && ax+aw > bx && ay < by2+bh2 && ay+ah > by2;
}

// ═══════════════════════════
// HIT FLASH
// ═══════════════════════════
function flashHit() {
  const f = document.getElementById('hitFlash');
  f.style.background = 'rgba(255,60,60,0.35)';
  f.style.opacity = '1';
  setTimeout(() => { f.style.opacity = '0'; }, 200);
}

// ═══════════════════════════
// DRAWING — BACKGROUND
// ═══════════════════════════
function drawBg() {
  const g = gc.createLinearGradient(0,0,0,GH);
  g.addColorStop(0, '#0b1520');
  g.addColorStop(1, '#132010');
  gc.fillStyle = g; gc.fillRect(0,0,GW,GH);

  // moon
  gc.beginPath(); gc.arc(GW-48,38,20,0,Math.PI*2);
  gc.fillStyle='#fffacc'; gc.fill();
  gc.beginPath(); gc.arc(GW-40,33,16,0,Math.PI*2);
  gc.fillStyle='#0b1520'; gc.fill();

  // stars
  gc.fillStyle='rgba(255,255,200,0.7)';
  [[28,18],[75,12],[130,32],[195,8],[270,22],[340,16],[395,38],[55,48],[310,44]].forEach(([x,y])=>{
    gc.fillRect(x,y,2,2);
  });

  // trees
  gc.fillStyle='#091508';
  for (let i=0;i<7;i++){
    const tx = ((i*75)+(frameN*(3.5*speedMult)*0.25))%( GW+60)-20;
    drawTree(tx, GROUND_Y-8);
  }

  // ground
  gc.fillStyle='#2a1500'; gc.fillRect(0,GROUND_Y+12,GW,GH-GROUND_Y-12);
  gc.fillStyle='#3a2000'; gc.fillRect(0,GROUND_Y+12,GW,7);

  // ground lines
  gc.strokeStyle='rgba(70,40,0,0.45)'; gc.lineWidth=1;
  for(let i=0;i<9;i++){
    const lx=((i*65)-(frameN*(3.5*speedMult)*0.4)%(65)+ GW)%GW;
    gc.beginPath(); gc.moveTo(lx,GROUND_Y+17); gc.lineTo(lx+25,GROUND_Y+21); gc.stroke();
  }
}

function drawTree(x,y){
  gc.fillStyle='#180e00'; gc.fillRect(x-3,y-13,7,18);
  gc.fillStyle='#091508';
  gc.beginPath(); gc.moveTo(x,y-52); gc.lineTo(x-16,y-22); gc.lineTo(x+16,y-22); gc.closePath(); gc.fill();
  gc.beginPath(); gc.moveTo(x,y-66); gc.lineTo(x-11,y-42); gc.lineTo(x+11,y-42); gc.closePath(); gc.fill();
}

function drawSpeedBar(){
  const bw=75, bh=7, bx=GW-bw-8, by2=10;
  gc.fillStyle='rgba(0,0,0,0.3)';
  gc.beginPath(); gc.roundRect(bx-2,by2-2,bw+4,bh+4,4); gc.fill();
  const p=Math.min((speedMult-1)/3,1);
  gc.fillStyle='rgba(255,255,255,0.08)'; gc.fillRect(bx,by2,bw,bh);
  gc.fillStyle= p<0.4?'#6bcb77': p<0.7?'#ffd93d':'#ff6b6b';
  gc.fillRect(bx,by2,bw*p,bh);
}

// ═══════════════════════════
// DRAWING — BEAR
// ═══════════════════════════
function drawBear(x,y,state,frame){
  const h = state==='squat'?SQUAT_H:STAND_H;
  const top = y - h;
  gc.save();
  if(invincible>0 && Math.floor(invincible/4)%2===0) gc.globalAlpha=0.35;

  const br='#8B4513', be='#cd853f', dk='#5C2D0A';

  if(state==='squat'){
    // body
    gc.fillStyle=br; gc.beginPath(); gc.ellipse(x,top+h*0.55,22,h*0.44,0,0,Math.PI*2); gc.fill();
    gc.fillStyle=be; gc.beginPath(); gc.ellipse(x,top+h*0.62,12,h*0.26,0,0,Math.PI*2); gc.fill();
    // head
    gc.fillStyle=br; gc.beginPath(); gc.ellipse(x+13,top+11,15,13,0.2,0,Math.PI*2); gc.fill();
    // ears
    gc.fillStyle=br;
    gc.beginPath(); gc.arc(x+4,top+2,6,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.arc(x+21,top+1,6,0,Math.PI*2); gc.fill();
    gc.fillStyle='#ffaaaa';
    gc.beginPath(); gc.arc(x+4,top+2,3,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.arc(x+21,top+1,3,0,Math.PI*2); gc.fill();
    // eyes
    gc.fillStyle='#000';
    gc.beginPath(); gc.arc(x+9,top+9,2.3,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.arc(x+19,top+9,2.3,0,Math.PI*2); gc.fill();
    gc.fillStyle='#fff';
    gc.beginPath(); gc.arc(x+10,top+8,0.9,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.arc(x+20,top+8,0.9,0,Math.PI*2); gc.fill();
    // snout
    gc.fillStyle=be; gc.beginPath(); gc.ellipse(x+15,top+15,6,4.5,0,0,Math.PI*2); gc.fill();
    gc.fillStyle='#000'; gc.beginPath(); gc.arc(x+15,top+13,2,0,Math.PI*2); gc.fill();
    // legs
    gc.fillStyle=dk;
    gc.beginPath(); gc.ellipse(x-9,top+h-4,8,7,-0.3,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.ellipse(x+9,top+h-4,8,7,0.3,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.ellipse(x-20,top+h*0.5,6,8,-0.2,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.ellipse(x+22,top+h*0.5,6,8,0.2,0,Math.PI*2); gc.fill();
  } else {
    const bob = state==='stand'?Math.sin(frame*0.12)*1.8:0;
    // legs
    const ls = state==='stand'?Math.sin(frame*0.18)*5:0;
    gc.fillStyle=dk;
    gc.beginPath(); gc.ellipse(x-9,top+h-4+bob,7,11,ls*0.04,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.ellipse(x+9,top+h-4+bob,7,11,-ls*0.04,0,Math.PI*2); gc.fill();
    // arms
    const as2 = state==='jump'?-0.55:Math.sin(frame*0.18)*0.28;
    gc.fillStyle=br;
    gc.beginPath(); gc.ellipse(x-18,top+h*0.52+bob,6,11,as2,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.ellipse(x+18,top+h*0.52+bob,6,11,-as2,0,Math.PI*2); gc.fill();
    // body
    gc.fillStyle=br; gc.beginPath(); gc.ellipse(x,top+h*0.62+bob,17,h*0.37,0,0,Math.PI*2); gc.fill();
    gc.fillStyle=be; gc.beginPath(); gc.ellipse(x,top+h*0.65+bob,10,h*0.23,0,0,Math.PI*2); gc.fill();
    // head
    gc.fillStyle=br; gc.beginPath(); gc.ellipse(x,top+15+bob,17,15,0,0,Math.PI*2); gc.fill();
    // ears
    gc.fillStyle=br;
    gc.beginPath(); gc.arc(x-11,top+4+bob,7,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.arc(x+11,top+4+bob,7,0,Math.PI*2); gc.fill();
    gc.fillStyle='#ffaaaa';
    gc.beginPath(); gc.arc(x-11,top+4+bob,3.5,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.arc(x+11,top+4+bob,3.5,0,Math.PI*2); gc.fill();
    // eyes
    const esc = state==='jump'?1.35:1;
    gc.fillStyle='#000';
    gc.beginPath(); gc.arc(x-6,top+13+bob,2.2*esc,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.arc(x+6,top+13+bob,2.2*esc,0,Math.PI*2); gc.fill();
    gc.fillStyle='#fff';
    gc.beginPath(); gc.arc(x-5,top+12+bob,0.9,0,Math.PI*2); gc.fill();
    gc.beginPath(); gc.arc(x+7,top+12+bob,0.9,0,Math.PI*2); gc.fill();
    // snout
    gc.fillStyle=be; gc.beginPath(); gc.ellipse(x,top+21+bob,8,5.5,0,0,Math.PI*2); gc.fill();
    gc.fillStyle='#000'; gc.beginPath(); gc.arc(x,top+18+bob,2.2,0,Math.PI*2); gc.fill();
    // smile (standing)
    if(state==='stand'){
      gc.strokeStyle='#000'; gc.lineWidth=1.5;
      gc.beginPath(); gc.arc(x,top+22+bob,4.5,0.2,Math.PI-0.2); gc.stroke();
    }
  }
  gc.restore();
}

// ═══════════════════════════
// DRAWING — BARREL
// ═══════════════════════════
function drawBarrel(b){
  gc.save();
  gc.translate(b.x, b.y);
  gc.rotate(b.rot);
  const w=b.w, h=b.h;
  const air=b.type==='air';
  gc.fillStyle=air?'#8B6914':'#6B3A10';
  gc.beginPath(); gc.ellipse(0,0,w/2,h/2,0,0,Math.PI*2); gc.fill();
  gc.strokeStyle=air?'#c8a830':'#3d1a00'; gc.lineWidth=3;
  gc.beginPath(); gc.ellipse(0,-h*0.2,w/2*0.9,4,0,0,Math.PI*2); gc.stroke();
  gc.beginPath(); gc.ellipse(0, h*0.2,w/2*0.9,4,0,0,Math.PI*2); gc.stroke();
  gc.lineWidth=2.5;
  gc.beginPath(); gc.ellipse(0,-h/2+3,w/2-4,5,0,0,Math.PI*2); gc.stroke();
  gc.beginPath(); gc.ellipse(0, h/2-3,w/2-4,5,0,0,Math.PI*2); gc.stroke();
  if(air){
    gc.shadowColor='#ffd700'; gc.shadowBlur=10;
    gc.strokeStyle='rgba(255,215,0,0.35)'; gc.lineWidth=2;
    gc.beginPath(); gc.ellipse(0,0,w/2+2,h/2+2,0,0,Math.PI*2); gc.stroke();
    gc.shadowBlur=0;
  }
  gc.restore();
}

// ═══════════════════════════
// POSE DETECTION
// ═══════════════════════════
function kp(kps, i){ const p=kps[i]; return(p&&p.score>SCORE_THR)?p:null; }

function normKps(kps){
  const w=video.videoWidth||640, h=video.videoHeight||480;
  return kps.map(p=>({...p,x:p.x/w,y:p.y/h}));
}

function getPoseState(kps){
  const lm=normKps(kps);
  const ls=kp(lm,5), rs=kp(lm,6);
  if(!ls||!rs) return 'stand';
  const sy=(ls.y+rs.y)/2;
  if(baseShoulderY===null){ calibN++; if(calibN>15) baseShoulderY=sy; return 'stand'; }
  const d=sy-baseShoulderY;
  if(d < -0.07) return 'jump';
  if(d >  0.08) return 'squat';
  return 'stand';
}

const SKEL = [[5,6],[5,7],[7,9],[6,8],[8,10],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];

async function poseLoop(){
  if(detector && video.readyState>=3 && video.videoWidth>0){
    try{
      const poses=await detector.estimatePoses(video, {flipHorizontal: false});
      pc.clearRect(0,0,pc.canvas.width,pc.canvas.height);
      if(poses.length>0){
        const kps=poses[0].keypoints;
        const newState=getPoseState(kps);

        // Hold logic for jump/squat to avoid jitter
        if(newState!=='stand'){
          if(!holdStart) holdStart=Date.now();
          if(Date.now()-holdStart>HOLD_MS/3) poseState=newState;
        } else {
          holdStart=null;
          poseState='stand';
        }

        // Draw mini skeleton
        const sx=pc.canvas.width/(video.videoWidth||640);
        const sy=pc.canvas.height/(video.videoHeight||480);
        pc.strokeStyle='rgba(77,150,255,0.5)'; pc.lineWidth=1.5;
        SKEL.forEach(([a,b])=>{
          const pa=kps[a],pb=kps[b];
          if(pa&&pb&&pa.score>SCORE_THR&&pb.score>SCORE_THR){
            pc.beginPath(); pc.moveTo(pa.x*sx,pa.y*sy); pc.lineTo(pb.x*sx,pb.y*sy); pc.stroke();
          }
        });
        kps.forEach(p=>{
          if(p.score>SCORE_THR){
            pc.beginPath(); pc.arc(p.x*sx,p.y*sy,3,0,Math.PI*2);
            pc.fillStyle='rgba(255,107,107,0.7)'; pc.fill();
          }
        });

        setStatus('on','Hahmo tunnistettu ✓');
        document.getElementById('chipJump').className='chip'+(poseState==='jump'?' active':'');
        document.getElementById('chipSquat').className='chip'+(poseState==='squat'?' active':'');
      } else {
        poseState='stand'; holdStart=null;
        setStatus('blink','Asetu kameran eteen...');
        document.getElementById('chipJump').className='chip';
        document.getElementById('chipSquat').className='chip';
      }
    }catch(e){}
  }
  requestAnimationFrame(poseLoop);
}

function setStatus(cls,txt){
  document.getElementById('statusDot').className='dot '+cls;
  document.getElementById('statusTxt').textContent=txt;
}

// ═══════════════════════════
// INIT
// ═══════════════════════════
async function init(){
  const loadEl=document.getElementById('loadStatus');
  const btn=document.getElementById('btnStart');

  // Camera
  loadEl.textContent='📷 Avataan kamera...';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}, audio:false
    });
    video.srcObject=stream;
    await new Promise(r=>{video.onloadedmetadata=r;});
    await video.play().catch(()=>{});
    await new Promise(r => setTimeout(r, 500)); // let first frames render
    const pc2=document.getElementById('poseCanvas');
    pc2.width=video.videoWidth||640;
    pc2.height=video.videoHeight||480;
  }catch(e){
    loadEl.textContent='⚠️ Kamera ei toimi — tarkista luvat Safarissa';
    // Allow playing without camera (keyboard fallback)
    btn.disabled=false;
    btn.textContent='Aloita (ilman kameraa) 🎮';
    runIdle();
    return;
  }

  // TensorFlow
  loadEl.textContent='🤖 Ladataan tekoälyä...';
  try{
    await tf.setBackend('webgl'); await tf.ready();
  }catch(e){
    await tf.setBackend('cpu'); await tf.ready();
  }

  try{
    detector=await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
    );
  }catch(e){
    loadEl.textContent='⚠️ Tekoäly ei latautunut — kokeile ilman hahmontunnistusta';
  }

  loadEl.textContent='✅ Valmis! Asetu kameran eteen.';
  btn.disabled=false;

  poseLoop();
  runIdle();
}

// Keyboard fallback (space = jump, down = squat) for desktop testing
document.addEventListener('keydown', e=>{
  if(!gameActive) return;
  if(e.code==='Space'||e.code==='ArrowUp') poseState='jump';
  if(e.code==='ArrowDown') poseState='squat';
});
document.addEventListener('keyup', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='ArrowDown') poseState='stand';
});

init();
</script>
